<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | School Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar(${activePage})}"></div>

<main class="page">
    <section class="page-heading">
        <p class="eyebrow">MVC Panel</p>
        <h1>Home</h1>
    </section>

    <section class="stats-grid">
        <a class="stat-card" th:href="@{/students}">
            <span class="stat-value" th:text="${studentCount}">0</span>
            <span class="stat-label">Ogrenciler</span>
        </a>
        <a class="stat-card" th:href="@{/courses}">
            <span class="stat-value" th:text="${courseCount}">0</span>
            <span class="stat-label">Courses</span>
        </a>
        <a class="stat-card" th:href="@{/enrollments}">
            <span class="stat-value" th:text="${enrollmentCount}">0</span>
            <span class="stat-label">Enrollments</span>
        </a>
    </section>

    <section class="quick-actions">
        <a class="action-row" th:href="@{/students}">
            <span>Student Management</span>
            <strong th:text="${studentCount} + ' active records'">0 active records</strong>
        </a>
        <a class="action-row" th:href="@{/courses}">
            <span>Course Management</span>
            <strong th:text="${courseCount} + ' active records'">0 active records</strong>
        </a>
        <a class="action-row" th:href="@{/enrollments}">
            <span>Enrollment Management</span>
            <strong th:text="${enrollmentCount} + ' active records'">0 active records</strong>
        </a>
    </section>
</main>
</body>
</html>
