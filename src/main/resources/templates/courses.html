<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | School Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar(${activePage})}"></div>

<main class="page">
    <section class="page-heading compact">
        <p class="eyebrow">Courses</p>
        <h1>Courses</h1>
    </section>

    <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="workspace-grid">
        <form class="form-panel"
              method="post"
              th:action="${editing} ? '/courses/' + ${editingId} : '/courses'"
              th:object="${courseForm}">
            <h2 th:text="${editing} ? 'Edit Course' : 'New Course'">New Course</h2>

            <div class="form-alert" th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <label>
                <span>Course Name</span>
                <input type="text" th:field="*{courseName}" placeholder="Course name">
                <small class="field-error" th:if="${#fields.hasErrors('courseName')}" th:errors="*{courseName}"></small>
            </label>

            <label>
                <span>Course Code</span>
                <input type="text" th:field="*{courseCode}" placeholder="CSE101">
                <small class="field-error" th:if="${#fields.hasErrors('courseCode')}" th:errors="*{courseCode}"></small>
            </label>

            <label>
                <span>Credits</span>
                <input type="number" min="1" th:field="*{credit}" placeholder="3">
                <small class="field-error" th:if="${#fields.hasErrors('credit')}" th:errors="*{credit}"></small>
            </label>

            <div class="button-row">
                <button class="primary-btn" type="submit" th:text="${editing} ? 'Update' : 'Save'">Save</button>
                <a class="secondary-btn" th:if="${editing}" th:href="@{/courses}">Cancel</a>
            </div>
        </form>

        <section class="table-panel">
            <div class="table-header">
                <h2>Course List</h2>
                <span th:text="${#lists.size(courses)} + ' records'">0 records</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Course Name</th>
                        <th>Course Code</th>
                        <th>Credits</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="5" class="empty-cell">No records found.</td>
                    </tr>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}">1</td>
                        <td th:text="${course.courseName}">Course</td>
                        <td th:text="${course.courseCode}">CSE101</td>
                        <td th:text="${course.credit}">3</td>
                        <td class="actions-cell">
                            <a class="table-link" th:href="@{/courses/edit/{id}(id=${course.id})}">Edit</a>
                            <form method="post" th:action="@{/courses/{id}/delete(id=${course.id})}">
                                <button class="danger-btn" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </section>
</main>
</body>
</html>
