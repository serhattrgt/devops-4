<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayitlar | School Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar(${activePage})}"></div>

<main class="page">
    <section class="page-heading compact">
        <p class="eyebrow">Enrollments</p>
        <h1>Kayitlar</h1>
    </section>

    <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="workspace-grid">
        <form class="form-panel" method="post" th:action="@{/enrollments}" th:object="${enrollmentForm}">
            <h2>Yeni Kayit</h2>

            <div class="form-alert" th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <label>
                <span>Ogrenci</span>
                <select th:field="*{studentId}">
                    <option value="">Ogrenci sec</option>
                    <option th:each="student : ${students}"
                            th:value="${student.id}"
                            th:text="${student.firstName + ' ' + student.lastName + ' (#' + student.id + ')'}">
                    </option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('studentId')}" th:errors="*{studentId}"></small>
            </label>

            <label>
                <span>Ders</span>
                <select th:field="*{courseId}">
                    <option value="">Ders sec</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:text="${course.courseCode + ' - ' + course.courseName}">
                    </option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}"></small>
            </label>

            <div class="button-row">
                <button class="primary-btn"
                        type="submit"
                        th:disabled="${#lists.isEmpty(students) or #lists.isEmpty(courses)}">Kaydet</button>
            </div>
        </form>

        <section class="table-panel">
            <div class="table-header">
                <h2>Kayit Listesi</h2>
                <span th:text="${#lists.size(enrollments)} + ' kayit'">0 kayit</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ogrenci ID</th>
                        <th>Ders ID</th>
                        <th>Islem</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(enrollments)}">
                        <td colspan="4" class="empty-cell">Kayit bulunamadi.</td>
                    </tr>
                    <tr th:each="enrollment : ${enrollments}">
                        <td th:text="${enrollment.id}">1</td>
                        <td th:text="${enrollment.studentId}">1</td>
                        <td th:text="${enrollment.courseId}">1</td>
                        <td class="actions-cell">
                            <form method="post" th:action="@{/enrollments/{id}/delete(id=${enrollment.id})}">
                                <button class="danger-btn" type="submit">Sil</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </section>
</main>
</body>
</html>
